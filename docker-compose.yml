services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: monitoring-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - sqlite_data:/app/data
      - backend_logs:/app/logs
    environment:
      NODE_ENV: production
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_very_long_random_secret_key}
      DB_PATH: /app/data/monitoring.db
      LOG_DIR: /app/logs
      LOG_LEVEL: info
      FRONTEND_URL: "*"
      SEED_SAMPLE_DATA: "false"
      DASHBOARD_CACHE_TTL_MS: 5000
      MONITOR_ROUTER_CONCURRENCY: 5
      SQLITE_POOL_MAX: 4
    networks:
      - monitoring_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: monitoring-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - monitoring_net

volumes:
  sqlite_data:
  backend_logs:

networks:
  monitoring_net:
    driver: bridge
